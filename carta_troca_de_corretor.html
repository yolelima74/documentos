<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>CARTA – TROCA DE CORRETOR</title>
<style>

  /* Cálculo previsível de dimensões */
  * { box-sizing: border-box; }

  body{
    font-family: Arial, sans-serif;
    background:#e5e5e5;        /* só na TELA; removido na impressão */
    margin: 0;
    padding: 20px;             /* respiro visual na TELA */
  }

  /* --- Folha A4 (retrato) na TELA --- */
  .container{
    width: 210mm;              /* largura A4 */
    min-height: 297mm;         /* altura A4 */
    margin: 10mm auto;         /* centraliza na TELA */
    background:#fff;
    padding: 15mm;             /* margem interna do conteúdo */
    box-shadow: 0 0 8px rgba(0,0,0,.15); /* efeito visual na TELA */
  }

  /* Cabeçalho/título */
  h1{
    padding-top: 80px;
    text-align:center;
    font-size: 20px;
    margin: 0 0 12mm 0;
    letter-spacing: .3px;
  }

  /* Parágrafos e tipografia geral */
  p{
    font-size: 14px;
    line-height: 1.7;
    text-align: justify;
    margin: 0 0 6mm 0;
  }

  /* Campos (linhas sublinhadas) */
  input{
    border:none;
    border-bottom:1px solid #000;
    outline:none;
    font-size:14px;
    padding: 0 2px;
  }

  /* Larguras dos campos (em mm) */
  .pp   { width: 10mm; }  /* “muito pequeno” */
  .p    { width: 25mm; }
  .m    { width: 40mm; }
  .g    { width: 80mm; }
  .gg   { width: 110mm; }
  .flex { display: inline-flex; gap: 2mm; align-items: baseline; }

  /* Blocos auxiliares */
  .espaco-grande { margin-top: 12mm; }

  /* Assinatura */
  .assinatura{
    margin-top: 20mm;
    text-align:center;
  }
  .linha-ass{
    margin: 10mm auto 3mm auto;
    border-bottom:1px solid #000;
    width:60%;
    height:28px;            /* área para assinar */
  }
  .sub{
    font-size: 13px;
    color:#333;
  }

  /* --- Configuração de IMPRESSÃO A4 --- */
  @page{
    size: A4;                /* garante A4 na impressão */
    margin: 12mm;            /* margens da página (ajuste se quiser) */
  }
  @media print{
    html, body{
      height: 100%;
      background: #fff !important;
      padding: 0;            /* sem padding do body ao imprimir */
    }
    .container{
      width: auto;           /* o navegador ajusta para A4 */
      min-height: auto;
      margin: 0;             /* sem margens externas na impressão */
      padding: 12mm;         /* margem interna do conteúdo impresso */
      box-shadow: none;      /* sombra não imprime */
      page-break-after: always;
    }
  }

  /* DOWNLOAD BUTTON */
  #download-bar { position: fixed; bottom: 24px; right: 28px; z-index: 9999; }
  #btn-download {
    background: #003791; color: #fff; border: none;
    padding: 12px 24px; font-family: Arial, sans-serif; font-size: 13px;
    font-weight: bold; border-radius: 6px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    display: flex; align-items: center; gap: 8px; transition: background 0.2s;
  }
  #btn-download:hover { background: #00509e; }
  #btn-download:disabled { opacity: 0.7; cursor: default; }
  @media print { #download-bar { display: none; } }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <div class="container">

    <h1>TROCA DE CORRETOR</h1>

    <p>
      Eu <input type="text" class="g" aria-label="Nome completo">,
      portador(a) do RG nº <input type="text" class="m" aria-label="Número do RG">,
      inscrito(a) no CPF: <input type="text" class="m" aria-label="CPF">,
      solicito a troca do(a) corretor(a)
      <input type="text" class="g" aria-label="Corretor(a) atual">
      da imobiliária
      <input type="text" class="g" aria-label="Imobiliária atual">
      para o(a) corretor(a)
      <input type="text" class="g" aria-label="Novo(a) corretor(a)">,
      CPF nº <input type="text" class="m" aria-label="CPF do(a) novo(a) corretor(a)"> e CRECI nº
      <input type="text" class="m" aria-label="CRECI do(a) novo(a) corretor(a)">
      para a imobiliária
      <input type="text" class="g" aria-label="Nova imobiliária">.
    </p>

    <div class="espaco-grande"></div>

    <p>
      <strong>FEIRA DE SANTANA - BA</strong>,
      <input type="text" class="pp" aria-label="Dia"> /
      <input type="text" class="pp" aria-label="Mês"> /
      <input type="text" class="pp" aria-label="Ano">
    </p>

    <div class="assinatura">
      <div class="linha-ass"></div>
      <div class="sub">(Assinatura do(a) solicitante)</div>
    </div>

  </div>



<div id="download-bar">
  <button id="btn-download" onclick="baixarPDF()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
      <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
      <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
    </svg>
    Baixar PDF
  </button>
</div>
<script>
async function baixarPDF() {
  const btn = document.getElementById('btn-download');
  btn.textContent = 'Gerando...'; btn.disabled = true;
  const pages = document.querySelectorAll('.container');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  for (let i = 0; i < pages.length; i++) {
    if (i > 0) pdf.addPage();
    const canvas = await html2canvas(pages[i], { scale: 2, useCORS: true, logging: false });
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, 210, 297);
  }
  pdf.save('Carta_Troca_de_Corretor.pdf');
  btn.innerHTML = 'Baixar PDF';
  btn.disabled = false;
}
</script>
</body>
</html>
